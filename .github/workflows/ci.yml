name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_mcp:
        description: "Run live MCP smoke tests"
        required: false
        default: false
        type: boolean
      run_full_golden:
        description: "Run full 51-fixture golden corpus regression"
        required: false
        default: false
        type: boolean

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        run: python -m ruff check .

  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Haskell toolchain for formula tests
        id: setup-haskell
        uses: haskell-actions/setup@v2.9.1
        with:
          ghc-version: "9.8.4"
          cabal-version: "latest"

      - name: Restore formula tool cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell.outputs.cabal-store }}
            .formula-tools
          key: ${{ runner.os }}-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-${{ hashFiles('src/paper_fetch/formula/install.py', 'src/paper_fetch/resources/formula/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install formula test backend
        run: |
          python -m paper_fetch.formula.install --target-dir "$PWD/.formula-tools" --no-node
          ./.formula-tools/bin/texmath --help >/dev/null

      - name: Run unit suite
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PAPER_FETCH_FORMULA_TOOLS_DIR: ${{ github.workspace }}/.formula-tools
        run: python -m pytest tests/unit tests/devtools -q

  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate extraction rules docs
        run: python scripts/validate_extraction_rules.py

      - name: Run integration suite
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -m pytest tests/integration -q

  package-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build wheel and sdist
        run: python -m build

      - name: Install wheel in clean venv
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/paper-fetch-wheel-smoke"
          "$RUNNER_TEMP/paper-fetch-wheel-smoke/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/paper-fetch-wheel-smoke/bin/python" -m pip install dist/*.whl

      - name: Verify console scripts
        shell: bash
        run: |
          "$RUNNER_TEMP/paper-fetch-wheel-smoke/bin/paper-fetch" --help >/dev/null
          "$RUNNER_TEMP/paper-fetch-wheel-smoke/bin/python" - <<'PY'
          from importlib.metadata import entry_points

          scripts = {entry_point.name: entry_point for entry_point in entry_points(group="console_scripts")}
          scripts["paper-fetch-mcp"].load()
          PY

  offline-linux-x86-64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            python-tag: "cp311"
          - python-version: "3.12"
            python-tag: "cp312"
          - python-version: "3.13"
            python-tag: "cp313"
          - python-version: "3.14"
            python-tag: "cp314"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Haskell toolchain for bundled texmath
        id: setup-haskell
        uses: haskell-actions/setup@v2.9.1
        with:
          ghc-version: "9.8.4"
          cabal-version: "latest"

      - name: Restore formula tool cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell.outputs.cabal-store }}
          key: ${{ runner.os }}-offline-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-${{ hashFiles('src/paper_fetch/formula/install.py', 'src/paper_fetch/resources/formula/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-offline-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-

      - name: Install browser system dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "playwright>=1.47,<2"
          python -m playwright install-deps chromium
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Build offline package
        run: scripts/build-offline-package.sh --output-dir "$PWD/offline-artifacts"

      - name: Verify offline package
        run: scripts/verify-offline-package.sh "$PWD/offline-artifacts/paper-fetch-skill-offline-linux-x86_64-${{ matrix.python-tag }}.tar.gz"

      - name: Upload offline package
        uses: actions/upload-artifact@v4
        with:
          name: paper-fetch-skill-offline-linux-x86_64-${{ matrix.python-tag }}
          path: offline-artifacts/paper-fetch-skill-offline-linux-x86_64-${{ matrix.python-tag }}.tar.gz
          if-no-files-found: error

  offline-windows-x86-64:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            python-tag: "cp311"
          - python-version: "3.12"
            python-tag: "cp312"
          - python-version: "3.13"
            python-tag: "cp313"
          - python-version: "3.14"
            python-tag: "cp314"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Haskell toolchain for bundled texmath
        id: setup-haskell
        uses: haskell-actions/setup@v2.9.1
        with:
          ghc-version: "9.8.4"
          cabal-version: "latest"

      - name: Restore formula tool cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell.outputs.cabal-store }}
          key: ${{ runner.os }}-offline-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-${{ hashFiles('src/paper_fetch/formula/install.py', 'src/paper_fetch/resources/formula/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-offline-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-

      - name: Build offline package
        shell: pwsh
        run: ./scripts/build-offline-package-windows.ps1 -OutputDir "$PWD/offline-artifacts"

      - name: Verify offline package
        shell: pwsh
        run: |
          $zip = "$PWD/offline-artifacts/paper-fetch-skill-offline-windows-x86_64-${{ matrix.python-tag }}.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "paper-fetch-offline-windows"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $extractRoot
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null
          Expand-Archive -LiteralPath $zip -DestinationPath $extractRoot -Force
          $bundle = Get-ChildItem -Path $extractRoot -Directory | Select-Object -First 1
          if ($null -eq $bundle) {
            throw "Could not locate extracted Windows offline bundle."
          }
          $bundleRoot = $bundle.FullName

          & (Join-Path $bundleRoot "install-offline.ps1") -NoUserConfig
          . (Join-Path $bundleRoot "Activate-Offline.ps1")

          paper-fetch --help | Out-Null
          & (Join-Path $bundleRoot "formula-tools/bin/texmath.exe") --help | Out-Null

          $playwrightCheck = @'
          from pathlib import Path
          import sys
          from playwright.sync_api import sync_playwright

          root = Path(sys.argv[1]).resolve()
          manager = sync_playwright().start()
          try:
              executable = Path(manager.chromium.executable_path).resolve()
          finally:
              manager.stop()

          assert executable.is_file(), executable
          assert root in executable.parents, (root, executable)
          '@
          python -c $playwrightCheck (Join-Path $bundleRoot "ms-playwright")

          $flareEnv = Join-Path $bundleRoot "vendor/flaresolverr/.env.flaresolverr-source-windows"
          try {
            & (Join-Path $bundleRoot "scripts/flaresolverr-up.ps1") $flareEnv
            $status = & (Join-Path $bundleRoot "scripts/flaresolverr-status.ps1") $flareEnv | ConvertFrom-Json
            if ($status.status -ne "ok") {
              throw "FlareSolverr sessions.list returned status=$($status.status)"
            }
          } finally {
            & (Join-Path $bundleRoot "scripts/flaresolverr-down.ps1") $flareEnv
          }

      - name: Upload offline package
        uses: actions/upload-artifact@v4
        with:
          name: paper-fetch-skill-offline-windows-x86_64-${{ matrix.python-tag }}
          path: offline-artifacts/paper-fetch-skill-offline-windows-x86_64-${{ matrix.python-tag }}.zip
          if-no-files-found: error

  full-golden:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_full_golden }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Haskell toolchain for formula tests
        id: setup-haskell
        uses: haskell-actions/setup@v2.9.1
        with:
          ghc-version: "9.8.4"
          cabal-version: "latest"

      - name: Restore formula tool cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell.outputs.cabal-store }}
            .formula-tools
          key: ${{ runner.os }}-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-${{ hashFiles('src/paper_fetch/formula/install.py', 'src/paper_fetch/resources/formula/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install formula test backend
        run: |
          python -m paper_fetch.formula.install --target-dir "$PWD/.formula-tools" --no-node
          ./.formula-tools/bin/texmath --help >/dev/null

      - name: Run full golden corpus regression
        env:
          PAPER_FETCH_RUN_FULL_GOLDEN: "1"
          PAPER_FETCH_FORMULA_TOOLS_DIR: ${{ github.workspace }}/.formula-tools
        run: pytest tests/integration/test_golden_corpus.py

  live-mcp:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_mcp }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run live MCP suite when secrets are available
        shell: bash
        env:
          PAPER_FETCH_RUN_LIVE: "1"
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
        run: |
          missing=()
          for key in CROSSREF_MAILTO ELSEVIER_API_KEY; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Skipping live MCP tests because required secrets are missing: ${missing[*]}"
            exit 0
          fi

          pytest -n 0 tests/live/test_live_mcp.py
