name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_mcp:
        description: "Run live MCP smoke tests"
        required: false
        default: false
        type: boolean
      run_full_golden:
        description: "Run full 50-fixture golden corpus regression"
        required: false
        default: false
        type: boolean

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        run: python -m ruff check .

  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Haskell toolchain for formula tests
        id: setup-haskell
        uses: haskell-actions/setup@v2.9.1
        with:
          ghc-version: "9.8.4"
          cabal-version: "latest"

      - name: Restore formula tool cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell.outputs.cabal-store }}
            .formula-tools
          key: ${{ runner.os }}-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-${{ hashFiles('src/paper_fetch/formula/install.py', 'src/paper_fetch/resources/formula/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install formula test backend
        run: |
          python -m paper_fetch.formula.install --target-dir "$PWD/.formula-tools" --no-node
          ./.formula-tools/bin/texmath --help >/dev/null

      - name: Run unit suite
        env:
          PAPER_FETCH_FORMULA_TOOLS_DIR: ${{ github.workspace }}/.formula-tools
        run: pytest tests/unit

  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate extraction rules docs
        run: python scripts/validate_extraction_rules.py

      - name: Run integration suite
        run: pytest tests/integration

  full-golden:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_full_golden }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Haskell toolchain for formula tests
        id: setup-haskell
        uses: haskell-actions/setup@v2.9.1
        with:
          ghc-version: "9.8.4"
          cabal-version: "latest"

      - name: Restore formula tool cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell.outputs.cabal-store }}
            .formula-tools
          key: ${{ runner.os }}-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-${{ hashFiles('src/paper_fetch/formula/install.py', 'src/paper_fetch/resources/formula/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-formula-tools-${{ steps.setup-haskell.outputs.ghc-version }}-

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install formula test backend
        run: |
          python -m paper_fetch.formula.install --target-dir "$PWD/.formula-tools" --no-node
          ./.formula-tools/bin/texmath --help >/dev/null

      - name: Run full golden corpus regression
        env:
          PAPER_FETCH_RUN_FULL_GOLDEN: "1"
          PAPER_FETCH_FORMULA_TOOLS_DIR: ${{ github.workspace }}/.formula-tools
        run: pytest tests/integration/test_golden_corpus.py

  live-mcp:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_mcp }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run live MCP suite when secrets are available
        shell: bash
        env:
          PAPER_FETCH_RUN_LIVE: "1"
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          SPRINGER_META_API_KEY: ${{ secrets.SPRINGER_META_API_KEY }}
          SPRINGER_OPENACCESS_API_KEY: ${{ secrets.SPRINGER_OPENACCESS_API_KEY }}
        run: |
          missing=()
          for key in CROSSREF_MAILTO ELSEVIER_API_KEY SPRINGER_META_API_KEY SPRINGER_OPENACCESS_API_KEY; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Skipping live MCP tests because required secrets are missing: ${missing[*]}"
            exit 0
          fi

          pytest -n 0 tests/live/test_live_mcp.py
